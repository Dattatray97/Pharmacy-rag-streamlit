<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElderGuard Nexus - Register</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 30px;
        }
        .register-container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px; padding: 45px;
            width: 500px; max-width: 100%;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }
        .brand { text-align: center; margin-bottom: 30px; }
        .brand-icon {
            width: 70px; height: 70px;
            background: linear-gradient(135deg, #64dcc8, #50b4ff);
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 12px; font-size: 30px; color: white;
        }
        .brand h1 { color: #fff; font-size: 24px; font-weight: 700; }
        .brand p { color: rgba(255,255,255,0.5); font-size: 13px; }
        .alert { padding: 12px 16px; border-radius: 10px; font-size: 14px; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        .alert-error { background: rgba(255,80,80,0.15); color: #ff9090; border: 1px solid rgba(255,80,80,0.3); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { margin-bottom: 18px; }
        .form-label { color: rgba(255,255,255,0.7); font-size: 13px; font-weight: 500; display: block; margin-bottom: 7px; }
        .input-wrapper { position: relative; }
        .input-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.4); font-size: 14px; }
        .form-control {
            width: 100%; padding: 12px 12px 12px 40px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; color: #fff; font-size: 14px; transition: all 0.3s; outline: none;
        }
        .form-control:focus { background: rgba(255,255,255,0.1); border-color: #64dcc8; box-shadow: 0 0 0 3px rgba(100,220,200,0.15); }
        .form-control::placeholder { color: rgba(255,255,255,0.25); }
        .btn-register {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #64dcc8, #50b4ff);
            border: none; border-radius: 12px;
            color: white; font-size: 15px; font-weight: 600;
            cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-register:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(100,220,200,0.4); }
        .login-link { text-align: center; margin-top: 20px; color: rgba(255,255,255,0.5); font-size: 14px; }
        .login-link a { color: #64dcc8; text-decoration: none; font-weight: 600; }
        .section-title { color: rgba(255,255,255,0.4); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 12px; border-top: 1px solid rgba(255,255,255,0.07); padding-top: 16px; }
        .field-error { color: #ff9090; font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>
<div class="register-container">
    <div class="brand">
        <div class="brand-icon"><i class="fas fa-shield-heart"></i></div>
        <h1>Create Account</h1>
        <p>Join ElderGuard Nexus as a Caretaker</p>
    </div>
    <div th:if="${error}" class="alert alert-error">
        <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
    </div>
    <form th:action="@{/register}" method="post" th:object="${user}">
        <div class="section-title" style="border-top:none; padding-top:0;">Personal Information</div>
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Full Name *</label>
                <div class="input-wrapper">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" th:field="*{fullName}" class="form-control" placeholder="Full name" required>
                </div>
                <span th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}" class="field-error"></span>
            </div>
            <div class="form-group">
                <label class="form-label">Email</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" th:field="*{email}" class="form-control" placeholder="Email address">
                </div>
                <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="field-error"></span>
            </div>
        </div>
        <div class="section-title">Account Credentials</div>
        <div class="form-group">
            <label class="form-label">Username *</label>
            <div class="input-wrapper">
                <i class="fas fa-at input-icon"></i>
                <input type="text" th:field="*{username}" class="form-control" placeholder="Choose a username (min 3 chars)" required>
            </div>
            <span th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="field-error"></span>
        </div>
        <div class="form-group">
            <label class="form-label">Password *</label>
            <div class="input-wrapper">
                <i class="fas fa-lock input-icon"></i>
                <input type="password" th:field="*{password}" class="form-control" placeholder="Create a strong password" required>
            </div>
            <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="field-error"></span>
        </div>
        <button type="submit" class="btn-register">
            <i class="fas fa-user-plus"></i> Create Caretaker Account
        </button>
    </form>
    <div class="login-link">
        Already have an account? <a th:href="@{/login}">Sign In</a>
    </div>
</div>
</body>
</html>
