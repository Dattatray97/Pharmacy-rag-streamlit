<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Patient - ElderGuard Nexus</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0d1117; --bg-secondary: #161b22; --bg-card: #1c2333; --bg-hover: #21262d;
            --border: #30363d; --text-primary: #e6edf3; --text-secondary: #8b949e; --text-muted: #6e7681;
            --accent-cyan: #58d5c8; --accent-blue: #58a6ff; --accent-green: #3fb950;
            --accent-yellow: #d29922; --accent-red: #f85149;
            --gradient-1: linear-gradient(135deg, #58d5c8, #58a6ff);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-primary); color: var(--text-primary); display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--bg-secondary); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 100; }
        .sidebar-logo { padding: 24px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
        .logo-icon { width: 42px; height: 42px; background: var(--gradient-1); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #fff; }
        .logo-text h2 { font-size: 16px; font-weight: 700; }
        .logo-text span { font-size: 11px; color: var(--text-muted); }
        .nav-section { padding: 16px 12px 8px; }
        .nav-section-title { font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; padding: 0 8px; margin-bottom: 6px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-radius: 10px; color: var(--text-secondary); font-size: 14px; font-weight: 500; text-decoration: none; transition: all 0.2s; margin-bottom: 2px; }
        .nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
        .nav-item.active { background: rgba(88,213,200,0.1); color: var(--accent-cyan); }
        .nav-item i { width: 18px; text-align: center; font-size: 15px; }
        .sidebar-footer { margin-top: auto; padding: 16px 12px; border-top: 1px solid var(--border); }
        .user-info { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; background: var(--bg-card); }
        .user-avatar { width: 36px; height: 36px; background: var(--gradient-1); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #fff; font-weight: 700; }
        .user-details h4 { font-size: 13px; font-weight: 600; }
        .user-details span { font-size: 11px; color: var(--text-muted); }
        .logout-btn { display: flex; align-items: center; gap: 8px; padding: 8px 14px; border-radius: 8px; background: rgba(248,81,73,0.1); color: var(--accent-red); text-decoration: none; font-size: 13px; font-weight: 500; margin-top: 8px; transition: all 0.2s; border: none; cursor: pointer; width: 100%; }
        .logout-btn:hover { background: rgba(248,81,73,0.2); }
        .main { margin-left: 260px; flex: 1; display: flex; flex-direction: column; }
        .topbar { padding: 16px 28px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
        .page-title h1 { font-size: 20px; font-weight: 700; }
        .page-title p { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
        .btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 7px; border: none; transition: all 0.2s; }
        .btn-primary { background: var(--gradient-1); color: white; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-secondary { background: var(--bg-card); color: var(--text-secondary); border: 1px solid var(--border); }
        .btn-secondary:hover { background: var(--bg-hover); color: var(--text-primary); }
        .content { padding: 24px 28px; flex: 1; }
        .form-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 28px; margin-bottom: 20px; }
        .form-card-title { font-size: 15px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; color: var(--accent-cyan); border-bottom: 1px solid var(--border); padding-bottom: 14px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
        .form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; }
        .form-group { display: flex; flex-direction: column; gap: 7px; }
        .form-group.full { grid-column: 1 / -1; }
        .form-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
        .form-label span { color: var(--accent-red); }
        .form-control { padding: 11px 14px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 9px; color: var(--text-primary); font-size: 14px; outline: none; transition: all 0.2s; font-family: inherit; }
        .form-control:focus { border-color: var(--accent-cyan); box-shadow: 0 0 0 3px rgba(88,213,200,0.1); }
        .form-control::placeholder { color: var(--text-muted); }
        select.form-control option { background: var(--bg-card); }
        textarea.form-control { resize: vertical; min-height: 90px; }
        .form-actions { display: flex; gap: 12px; margin-top: 8px; }
        .required-note { font-size: 12px; color: var(--text-muted); margin-bottom: 20px; }
        .required-note span { color: var(--accent-red); }
    </style>
</head>
<body>
<nav class="sidebar">
    <div class="sidebar-logo">
        <div class="logo-icon"><i class="fas fa-shield-heart"></i></div>
        <div class="logo-text"><h2>ElderGuard</h2><span>Nexus v1.0</span></div>
    </div>
    <div style="flex:1; overflow-y:auto; padding: 8px 0;">
        <div class="nav-section">
            <div class="nav-section-title">Main</div>
            <a href="/dashboard" class="nav-item"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a href="/patients" class="nav-item active"><i class="fas fa-users"></i> Patients</a>
        </div>
        <div class="nav-section">
            <div class="nav-section-title">Clinical</div>
            <a href="/health" class="nav-item"><i class="fas fa-heartbeat"></i> Health Monitor</a>
            <a href="/emergency" class="nav-item"><i class="fas fa-exclamation-triangle"></i> Emergency SOS</a>
        </div>
        <div class="nav-section">
            <div class="nav-section-title">Services</div>
            <a href="/orders" class="nav-item"><i class="fas fa-shopping-cart"></i> Orders</a>
        </div>
    </div>
    <div class="sidebar-footer">
        <div class="user-info">
            <div class="user-avatar" th:text="${#strings.toUpperCase(#strings.substring(currentUser, 0, 1))}">U</div>
            <div class="user-details"><h4 th:text="${currentUser}">Caretaker</h4><span>Caretaker</span></div>
        </div>
        <form th:action="@{/logout}" method="post" style="margin-top:8px;">
            <button type="submit" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
        </form>
    </div>
</nav>

<div class="main">
    <div class="topbar">
        <div class="page-title">
            <h1><i class="fas fa-user-plus" style="color:var(--accent-cyan); margin-right:10px;"></i>Add New Patient</h1>
            <p>Register a new elderly patient into the care system</p>
        </div>
        <a href="/patients" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Back to Patients</a>
    </div>
    <div class="content">
        <p class="required-note"><span>*</span> Required fields</p>
        <form th:action="@{/patients/add}" method="post" th:object="${patient}">

            <!-- Personal Information -->
            <div class="form-card">
                <div class="form-card-title"><i class="fas fa-id-card"></i> Personal Information</div>
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">Full Name <span>*</span></label>
                        <input type="text" th:field="*{fullName}" class="form-control" placeholder="Patient's full name" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Age <span>*</span></label>
                        <input type="number" th:field="*{age}" class="form-control" placeholder="Age in years" min="0" max="150" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Gender</label>
                        <select th:field="*{gender}" class="form-control">
                            <option value="">Select gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Date of Birth</label>
                        <input type="date" th:field="*{dateOfBirth}" class="form-control">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Blood Group</label>
                        <select th:field="*{bloodGroup}" class="form-control">
                            <option value="">Select blood group</option>
                            <option value="A+">A+</option>
                            <option value="A-">A-</option>
                            <option value="B+">B+</option>
                            <option value="B-">B-</option>
                            <option value="AB+">AB+</option>
                            <option value="AB-">AB-</option>
                            <option value="O+">O+</option>
                            <option value="O-">O-</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Room Number</label>
                        <input type="text" th:field="*{roomNumber}" class="form-control" placeholder="e.g., Room 201">
                    </div>
                    <div class="form-group full">
                        <label class="form-label">Home Address</label>
                        <input type="text" th:field="*{address}" class="form-control" placeholder="Patient's home address">
                    </div>
                </div>
            </div>

            <!-- Medical Information -->
            <div class="form-card">
                <div class="form-card-title"><i class="fas fa-notes-medical"></i> Medical Information</div>
                <div class="form-grid">
                    <div class="form-group full">
                        <label class="form-label">Medical Conditions / Diagnoses</label>
                        <textarea th:field="*{medicalConditions}" class="form-control" placeholder="e.g., Hypertension, Diabetes Type 2, Arthritis..."></textarea>
                    </div>
                    <div class="form-group full">
                        <label class="form-label">Known Allergies</label>
                        <textarea th:field="*{allergies}" class="form-control" placeholder="e.g., Penicillin, Peanuts, Latex..." style="min-height:70px;"></textarea>
                    </div>
                </div>
            </div>

            <!-- Emergency Contact -->
            <div class="form-card">
                <div class="form-card-title"><i class="fas fa-phone-alt"></i> Emergency Contact</div>
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">Contact Person Name</label>
                        <input type="text" th:field="*{emergencyContact}" class="form-control" placeholder="Emergency contact name">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Contact Phone Number</label>
                        <input type="tel" th:field="*{emergencyContactPhone}" class="form-control" placeholder="Emergency contact phone">
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-user-plus"></i> Register Patient
                </button>
                <a href="/patients" class="btn btn-secondary">
                    <i class="fas fa-times"></i> Cancel
                </a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
