<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElderGuard Nexus - Login</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(100,220,200,0.08) 0%, transparent 70%);
            top: -200px; right: -200px;
            border-radius: 50%;
        }
        body::after {
            content: '';
            position: absolute;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(80,180,255,0.08) 0%, transparent 70%);
            bottom: -100px; left: -100px;
            border-radius: 50%;
        }
        .login-container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 50px 45px;
            width: 440px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            position: relative;
            z-index: 10;
        }
        .brand {
            text-align: center;
            margin-bottom: 35px;
        }
        .brand-icon {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #64dcc8, #50b4ff);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 15px;
            font-size: 35px; color: white;
            box-shadow: 0 10px 30px rgba(100,220,200,0.3);
        }
        .brand h1 { color: #fff; font-size: 26px; font-weight: 700; }
        .brand p { color: rgba(255,255,255,0.5); font-size: 13px; margin-top: 5px; }
        .alert {
            padding: 12px 16px; border-radius: 10px;
            font-size: 14px; margin-bottom: 20px;
            display: flex; align-items: center; gap: 10px;
        }
        .alert-error { background: rgba(255,80,80,0.15); color: #ff9090; border: 1px solid rgba(255,80,80,0.3); }
        .alert-success { background: rgba(80,200,120,0.15); color: #80d890; border: 1px solid rgba(80,200,120,0.3); }
        .form-group { margin-bottom: 20px; }
        .form-label { color: rgba(255,255,255,0.7); font-size: 13px; font-weight: 500; display: block; margin-bottom: 8px; }
        .input-wrapper { position: relative; }
        .input-icon {
            position: absolute; left: 15px; top: 50%; transform: translateY(-50%);
            color: rgba(255,255,255,0.4); font-size: 16px;
        }
        .form-control {
            width: 100%; padding: 14px 15px 14px 45px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; color: #fff; font-size: 15px;
            transition: all 0.3s;
            outline: none;
        }
        .form-control:focus {
            background: rgba(255,255,255,0.1);
            border-color: #64dcc8;
            box-shadow: 0 0 0 3px rgba(100,220,200,0.15);
        }
        .form-control::placeholder { color: rgba(255,255,255,0.25); }
        .btn-login {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, #64dcc8, #50b4ff);
            border: none; border-radius: 12px;
            color: white; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: all 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(100,220,200,0.4); }
        .btn-login:active { transform: translateY(0); }
        .register-link {
            text-align: center; margin-top: 25px;
            color: rgba(255,255,255,0.5); font-size: 14px;
        }
        .register-link a { color: #64dcc8; text-decoration: none; font-weight: 600; }
        .register-link a:hover { text-decoration: underline; }
        .divider { display: flex; align-items: center; margin: 25px 0; gap: 12px; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.1); }
        .divider span { color: rgba(255,255,255,0.3); font-size: 12px; }
        .demo-creds {
            background: rgba(100,220,200,0.08);
            border: 1px solid rgba(100,220,200,0.2);
            border-radius: 10px; padding: 12px 15px;
            font-size: 12px; color: rgba(255,255,255,0.5);
            text-align: center;
        }
        .demo-creds strong { color: #64dcc8; }
    </style>
</head>
<body>
<div class="login-container">
    <div class="brand">
        <div class="brand-icon"><i class="fas fa-shield-heart"></i></div>
        <h1>ElderGuard Nexus</h1>
        <p>Geriatric Care Management System</p>
    </div>
    <div th:if="${error}" class="alert alert-error">
        <i class="fas fa-exclamation-circle"></i>
        <span th:text="${error}"></span>
    </div>
    <div th:if="${success}" class="alert alert-success">
        <i class="fas fa-check-circle"></i>
        <span th:text="${success}"></span>
    </div>
    <div th:if="${logout}" class="alert alert-success">
        <i class="fas fa-sign-out-alt"></i>
        <span th:text="${logout}"></span>
    </div>
    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label class="form-label">Username</label>
            <div class="input-wrapper">
                <i class="fas fa-user input-icon"></i>
                <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Password</label>
            <div class="input-wrapper">
                <i class="fas fa-lock input-icon"></i>
                <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
            </div>
        </div>
        <button type="submit" class="btn-login">
            <i class="fas fa-sign-in-alt"></i> Sign In to System
        </button>
    </form>
    <div class="divider"><span>NEW HERE?</span></div>
    <div class="register-link">
        Don't have an account? <a th:href="@{/register}">Create Account</a>
    </div>
    <div class="demo-creds" style="margin-top:15px;">
        <strong>Demo:</strong> Register a new account to get started
    </div>
</div>
</body>
</html>
